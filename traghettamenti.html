<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>Traghettamenti · Parco Prenestino</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --card: #151d2e;
    --border: #1e2d47;
    --accent: #f97316;
    --accent2: #38bdf8;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; max-width:430px; margin:0 auto; overflow-x:hidden; }

  .header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:100; }
  .header-title { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
  .clock { font-family:var(--mono); font-size:13px; color:var(--accent2); }
  .day-badge { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--accent); background:rgba(249,115,22,0.12); padding:3px 8px; border-radius:4px; border:1px solid rgba(249,115,22,0.25); }

  .screen { display:none; padding:20px; }
  .screen.active { display:block; }

  .home-logo { text-align:center; padding:36px 0 28px; }
  .home-logo .train-icon { font-size:52px; display:block; margin-bottom:10px; }
  .home-logo .line1 { font-size:26px; font-weight:800; }
  .home-logo .line2 { font-size:11px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-top:4px; }

  .big-btn { width:100%; padding:22px 20px; border-radius:16px; border:none; cursor:pointer; text-align:left; margin-bottom:12px; position:relative; overflow:hidden; transition:transform 0.15s; font-family:var(--sans); }
  .big-btn:active { transform:scale(0.97); }
  .big-btn.primary { background:linear-gradient(135deg,#f97316,#ea580c); box-shadow:0 8px 32px rgba(249,115,22,0.3); }
  .big-btn.secondary { background:var(--card); border:1px solid var(--border); }
  .big-btn .btn-label { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; opacity:0.7; margin-bottom:4px; color:#fff; }
  .big-btn .btn-title { font-size:22px; font-weight:800; color:#fff; }
  .big-btn .btn-sub { font-size:12px; margin-top:4px; opacity:0.6; color:#fff; }
  .big-btn .arrow { position:absolute; right:20px; top:50%; transform:translateY(-50%); font-size:28px; opacity:0.35; color:#fff; }

  .section-title { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }

  .turno-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:20px; }
  .turno-btn { padding:14px 6px; border-radius:12px; border:1.5px solid var(--border); background:var(--card); color:var(--text); font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; text-align:center; transition:all 0.15s; }
  .turno-btn .emoji { font-size:20px; display:block; margin-bottom:5px; }
  .turno-btn.active { border-color:var(--accent); background:rgba(249,115,22,0.12); color:var(--accent); }
  .turno-btn:active { transform:scale(0.95); }

  /* FILTRO RUOLO */
  .filtro-wrap { margin-bottom:18px; }
  .filtro-label { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .filtro-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
  .filtro-btn { padding:9px 2px; border-radius:10px; border:1.5px solid var(--border); background:var(--card); color:var(--muted); font-family:var(--mono); font-size:10px; font-weight:700; cursor:pointer; text-align:center; transition:all 0.15s; }
  .filtro-btn:active { transform:scale(0.95); }
  .filtro-btn:disabled { opacity:0.25; cursor:default; }
  .f-active-tutti      { border-color:var(--accent);  background:rgba(249,115,22,0.12); color:var(--accent); }
  .f-active-traghetto  { border-color:var(--accent2); background:rgba(56,189,248,0.12); color:var(--accent2); }
  .f-active-t1         { border-color:var(--green);   background:rgba(74,222,128,0.1);  color:var(--green); }
  .f-active-t2         { border-color:var(--yellow);  background:rgba(251,191,36,0.1);  color:var(--yellow); }
  .f-active-t3         { border-color:var(--purple);  background:rgba(167,139,250,0.1); color:var(--purple); }

  .turno-nav { display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 16px; margin-bottom:16px; }
  .turno-nav-label { text-align:center; }
  .turno-nav-name { font-size:16px; font-weight:800; }
  .turno-nav-sub { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
  .nav-arrow { background:none; border:none; color:var(--accent2); font-size:24px; cursor:pointer; padding:4px 10px; border-radius:8px; transition:background 0.15s; }
  .nav-arrow:active { background:rgba(56,189,248,0.1); }

  .treni-list { display:flex; flex-direction:column; gap:10px; }
  .treno-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; cursor:pointer; transition:all 0.15s; position:relative; min-height:66px; }
  .treno-card:active { transform:scale(0.98); }
  .treno-card.highlight { border-color:var(--accent); box-shadow:0 0 0 1px rgba(249,115,22,0.25); }
  .treno-card.dimmed { opacity:0.3; pointer-events:none; }

  .trole-badge { position:absolute; top:12px; right:12px; font-size:9px; font-weight:700; letter-spacing:1px; padding:3px 8px; border-radius:4px; }
  .trole-traghetto { background:rgba(56,189,248,0.15); color:var(--accent2); border:1px solid rgba(56,189,248,0.3); }
  .trole-t1 { background:rgba(74,222,128,0.12); color:var(--green); border:1px solid rgba(74,222,128,0.3); }
  .trole-t2 { background:rgba(251,191,36,0.12); color:var(--yellow); border:1px solid rgba(251,191,36,0.3); }
  .trole-t3 { background:rgba(167,139,250,0.12); color:var(--purple); border:1px solid rgba(167,139,250,0.3); }

  .treno-now-badge { position:absolute; bottom:12px; right:12px; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; background:var(--accent); color:#fff; padding:3px 8px; border-radius:20px; }
  .acc-badge-sm { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; background:rgba(74,222,128,0.12); color:var(--green); border:1px solid rgba(74,222,128,0.3); padding:2px 6px; border-radius:4px; display:inline-block; margin-left:6px; vertical-align:middle; }
  .note-pill { font-size:9px; font-weight:700; color:var(--red); background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.2); padding:2px 6px; border-radius:4px; display:inline-block; margin-left:4px; }

  .treno-num { font-family:var(--mono); font-size:20px; font-weight:700; color:var(--accent2); }
  .treno-tipo { display:inline-block; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:2px 7px; border-radius:4px; margin-left:6px; vertical-align:middle; }
  .tipo-vallone { background:rgba(251,191,36,0.15); color:var(--yellow); border:1px solid rgba(251,191,36,0.3); }
  .tipo-tradizionale { background:rgba(56,189,248,0.12); color:var(--accent2); border:1px solid rgba(56,189,248,0.25); }
  .tipo-htr { background:rgba(167,139,250,0.12); color:var(--purple); border:1px solid rgba(167,139,250,0.25); }
  .treno-orari { font-size:12px; color:var(--muted); margin-top:5px; font-family:var(--mono); }
  .excluded-label { font-size:10px; color:var(--red); font-weight:700; margin-top:4px; }

  .back-btn { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--accent2); background:none; border:none; cursor:pointer; padding:0; margin-bottom:18px; font-family:var(--sans); }

  .detail-hero { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:22px; margin-bottom:12px; }
  .detail-num { font-family:var(--mono); font-size:48px; font-weight:700; color:var(--accent2); line-height:1; }
  .detail-tipo { margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .info-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; }
  .info-box.full { grid-column:1/-1; }
  .info-box-label { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .info-box-value { font-family:var(--mono); font-size:18px; font-weight:700; }
  .v-accent { color:var(--accent); }
  .v-blue { color:var(--accent2); }
  .v-yellow { color:var(--yellow); }
  .v-green { color:var(--green); }
  .v-red { color:var(--red); }
  .info-box-sub { font-size:11px; color:var(--muted); margin-top:2px; }

  .prova-box { background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(249,115,22,0.07)); border:1px solid rgba(251,191,36,0.3); border-radius:14px; padding:16px; margin-bottom:12px; display:flex; gap:14px; align-items:center; }
  .prova-icon { font-size:34px; flex-shrink:0; }
  .prova-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--yellow); margin-bottom:3px; }
  .prova-value { font-size:20px; font-weight:800; }
  .prova-sub { font-size:11px; color:var(--muted); margin-top:2px; }

  .acc-box { background:rgba(74,222,128,0.07); border:1px solid rgba(74,222,128,0.25); border-radius:14px; padding:14px 16px; margin-bottom:12px; }
  .acc-box-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--green); margin-bottom:6px; }
  .acc-sub { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.5; }

  .seq-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; margin-bottom:12px; }
  .seq-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .seq-flow { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
  .seq-item { font-family:var(--mono); font-size:13px; font-weight:700; padding:5px 10px; border-radius:8px; }
  .seq-current { background:rgba(249,115,22,0.2); color:var(--accent); border:1px solid rgba(249,115,22,0.4); }
  .seq-normal { background:rgba(255,255,255,0.05); color:var(--muted); border:1px solid var(--border); }
  .seq-acc { background:rgba(74,222,128,0.1); color:var(--green); border:1px solid rgba(74,222,128,0.3); }
  .seq-arrow { color:var(--muted); font-size:14px; }
  .seq-hint { font-size:10px; color:var(--muted); margin-top:8px; }

  .rientro-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
  .rientro-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
  .rientro-option { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
  .rientro-option:last-child { border-bottom:none; padding-bottom:0; }
  .rdot { width:7px; height:7px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .rdot-orange { background:var(--accent); }
  .rdot-blue   { background:var(--accent2); }
  .rdot-green  { background:var(--green); }
  .rdot-yellow { background:var(--yellow); }
  .rientro-text { font-size:13px; line-height:1.5; }
  .rtime { font-family:var(--mono); font-weight:700; color:var(--accent2); }

  .note-box { background:rgba(248,113,113,0.07); border:1px solid rgba(248,113,113,0.2); border-radius:14px; padding:14px 16px; margin-bottom:12px; font-size:12px; line-height:1.6; }
  .note-box-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--red); margin-bottom:6px; }

  .empty-msg { color:var(--muted); font-size:13px; padding:24px 0; text-align:center; }

  /* SEARCH */
  .search-wrap { margin-top:8px; }
  .search-label { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .search-row { display:flex; gap:8px; }
  .search-input { flex:1; background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:14px 16px; font-family:var(--mono); font-size:16px; color:var(--text); outline:none; transition:border-color 0.15s; -webkit-appearance:none; }
  .search-input::placeholder { color:var(--muted); }
  .search-input:focus { border-color:var(--accent2); }
  .search-btn { background:var(--accent2); border:none; border-radius:12px; padding:14px 18px; font-family:var(--sans); font-size:13px; font-weight:700; color:#0a0f1e; cursor:pointer; transition:opacity 0.15s; white-space:nowrap; }
  .search-btn:active { opacity:0.8; }
  .search-results-wrap { margin-top:14px; }
  .search-result-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:all 0.15s; }
  .search-result-card:active { transform:scale(0.98); }
  .search-result-turno { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .search-not-found { text-align:center; padding:20px 0; color:var(--muted); font-size:13px; }



  /* STATO TRENO */
  .stato-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border-radius:14px; border:1.5px solid var(--border); background:var(--card); color:var(--accent2); font-family:var(--sans); font-size:13px; font-weight:700; cursor:pointer; margin-bottom:12px; transition:all 0.15s; }
  .stato-btn:active { opacity:0.75; transform:scale(0.98); }
  .stato-box { border-radius:14px; padding:16px; margin-bottom:12px; }
  .stato-box.orario { background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.3); }
  .stato-box.ritardo { background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.3); }
  .stato-box.cancellato { background:rgba(248,113,113,0.15); border:1px solid rgba(248,113,113,0.5); }
  .stato-box.loading { background:var(--card); border:1px solid var(--border); }
  .stato-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .stato-ritardo { font-family:var(--mono); font-size:28px; font-weight:700; }
  .stato-ritardo.green { color:var(--green); }
  .stato-ritardo.red { color:var(--red); }
  .stato-info { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.5; }
  .stato-binario { display:inline-block; font-family:var(--mono); font-size:13px; font-weight:700; color:var(--yellow); background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.3); padding:3px 10px; border-radius:6px; margin-top:6px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Traghettamenti · PP</div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="day-badge" id="dayBadge"></span>
    <span class="clock" id="clock"></span>
  </div>
</div>

<!-- HOME -->
<div class="screen active" id="screenHome">
  <div class="home-logo">
    <span class="train-icon">🚆</span>
    <div class="line1">Traghettamenti</div>
    <div class="line2">Parco Prenestino</div>
  </div>
  <button class="big-btn primary" onclick="goTraghettamento()">
    <div class="btn-label">Modalità attiva</div>
    <div class="btn-title">Sto Traghettando</div>
    <div class="btn-sub">Turno automatico · filtra per Trenitalia / T1 / T2 / T3</div>
    <span class="arrow">→</span>
  </button>
  <button class="big-btn secondary" onclick="goConsulta()">
    <div class="btn-label">Solo lettura</div>
    <div class="btn-title">Consulta Orari</div>
    <div class="btn-sub">Sfoglia tutti i turni liberamente</div>
    <span class="arrow">→</span>
  </button>

  <div class="search-wrap">
    <div class="search-label">🔍 Cerca treno</div>
    <div class="search-row">
      <input type="number" id="searchInput" class="search-input" placeholder="Es. 534, 774, 591…" inputmode="numeric">
      <button class="search-btn" onclick="cercaTreno()">Cerca</button>
    </div>
    <div id="searchResults"></div>
  </div>
</div>

<!-- CONSULTA -->
<div class="screen" id="screenConsulta">
  <button class="back-btn" onclick="goHome()">← Indietro</button>
  <div class="section-title">Seleziona Turno</div>
  <div class="turno-grid">
    <button class="turno-btn" id="btnMattina" onclick="selectTurno('mattina')"><span class="emoji">🌅</span>Mattina</button>
    <button class="turno-btn" id="btnPomeriggio" onclick="selectTurno('pomeriggio')"><span class="emoji">☀️</span>Pomeriggio</button>
    <button class="turno-btn" id="btnNotte" onclick="selectTurno('notte')"><span class="emoji">🌙</span>Notte</button>
  </div>
  <div class="section-title" id="consultaTurnoLabel">Turno Mattina 🌅</div>
  <div class="treni-list" id="consultaList"></div>
</div>

<!-- TRAGHETTAMENTO -->
<div class="screen" id="screenTreno">
  <button class="back-btn" onclick="goHome()">← Indietro</button>
  <div class="turno-nav">
    <button class="nav-arrow" onclick="prevTurno()">‹</button>
    <div class="turno-nav-label">
      <div class="turno-nav-name" id="turnoName"></div>
      <div class="turno-nav-sub" id="turnoRange"></div>
    </div>
    <button class="nav-arrow" onclick="nextTurno()">›</button>
  </div>
  <div class="filtro-wrap">
    <div class="filtro-label">Il mio ruolo</div>
    <div class="filtro-grid">
      <button class="filtro-btn" id="fTutti"     onclick="setFiltro('tutti')">Tutti</button>
      <button class="filtro-btn" id="fTraghetto" onclick="setFiltro('traghetto')">Trenitalia</button>
      <button class="filtro-btn" id="fT1"        onclick="setFiltro('t1')">T1</button>
      <button class="filtro-btn" id="fT2"        onclick="setFiltro('t2')">T2</button>
      <button class="filtro-btn" id="fT3"        onclick="setFiltro('t3')">T3</button>
    </div>
  </div>
  <div class="section-title">Treni del turno</div>
  <div class="treni-list" id="trenoList"></div>
</div>

<!-- DETAIL -->
<div class="screen" id="screenDetail">
  <button class="back-btn" id="detailBack">← Indietro</button>
  <div id="detailContent"></div>
</div>

<script>
// ── DATI ──────────────────────────────────────────────────────────────────────

const TURNI = {
  mattina: {
    nome:'Turno Mattina', emoji:'🌅', range:'06:00 – 14:00',
    // ruoli: per ogni ruolo, treni portati + acc da provare
    ruoli: {
      traghetto: { treni:[723,1956,727], acc:[] },
      t1:        { treni:[534,531],      acc:[540] },
      t2:        { treni:[703,581,553],  acc:[] },
      t3:        { treni:[771,1960],     acc:[592] }
    },
    treni: [
      { id:771,  tipo:'TRADIZIONALE', desc:'Rientro Tradizionale da Termini',
        presentazione:'06:35', partenzaPP:null, arrTermini:null, notaDa:'Da Termini ore 6:35',
        rientro:[
          {tipo:'navetta', desc:'Corsetta Parco 06:10', note:'Lun-Ven'},
          {tipo:'taxi',    desc:'Taxi', soloGiorni:['sabato','domenica']}
        ],
        note:'Rientro Tradizionale ore 6:35 Da Termini. Prendere Corsetta Parco alle 6:10 (Lun-Ven). Sab-Dom e Festivi: Taxi.',
        excludeOn:[] },

      { id:534,  tipo:'VALLONE', desc:'VALLONE',
        partenzaPP:'06:10', arrTermini:'07:13',
        rientro:[
          {tipo:'treno', trenoNum:531, tipoTreno:'TRADIZIONALE', orario:'08:55', note:'531 Escluso Domenica', excludeGiorni:['domenica']},
          {tipo:'domenica', desc:'Navetta 08:25 Linea 1 (Via Marsala)'}
        ],

// ── STATE ──────────────────────────────────────────────────────────────────────
let currentMode = 'consulta';
let currentTurnoKey = 'mattina';
let currentFiltro = 'tutti';
let currentBackScreen = 'screenConsulta';

const TURNI_ORDER = ['mattina','pomeriggio','notte'];
const GIORNI = ['domenica','lunedi','martedi','mercoledi','giovedi','venerdi','sabato'];
const GIORNI_LABEL = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

function getGiorno() { return GIORNI[new Date().getDay()]; }
function getTurnoByOra() {
  const h = new Date().getHours();
  if (h >= 6 && h < 14) return 'mattina';
  if (h >= 14 && h < 22) return 'pomeriggio';
  return 'notte';
}

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('dayBadge').textContent = GIORNI_LABEL[n.getDay()];
}
updateClock();
setInterval(updateClock, 10000);

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goHome() { showScreen('screenHome'); }

function goConsulta() {
  currentMode = 'consulta';
  showScreen('screenConsulta');
  selectTurno('mattina');
}

function goTraghettamento() {
  currentMode = 'traghettamento';
  currentTurnoKey = getTurnoByOra();
  currentFiltro = 'tutti';
  renderTurnoNav();
  renderFiltroButtons();
  renderTrenoList('trenoList', currentTurnoKey, true);
  showScreen('screenTreno');
}

function prevTurno() {
  const idx = TURNI_ORDER.indexOf(currentTurnoKey);
  currentTurnoKey = TURNI_ORDER[(idx-1+3)%3];
  renderTurnoNav();
  renderFiltroButtons();
  renderTrenoList('trenoList', currentTurnoKey, true);
}
function nextTurno() {
  const idx = TURNI_ORDER.indexOf(currentTurnoKey);
  currentTurnoKey = TURNI_ORDER[(idx+1)%3];
  renderTurnoNav();
  renderFiltroButtons();
  renderTrenoList('trenoList', currentTurnoKey, true);
}
function renderTurnoNav() {
  const t = TURNI[currentTurnoKey];
  document.getElementById('turnoName').textContent = t.emoji+' '+t.nome;
  document.getElementById('turnoRange').textContent = t.range;
}

// ── FILTRO ────────────────────────────────────────────────────────────────────
function setFiltro(f) {
  currentFiltro = f;
  renderFiltroButtons();
  renderTrenoList('trenoList', currentTurnoKey, true);
}

function renderFiltroButtons() {
  const turno = TURNI[currentTurnoKey];
  const ids = { tutti:'fTutti', traghetto:'fTraghetto', t1:'fT1', t2:'fT2', t3:'fT3' };
  const activeClass = { tutti:'f-active-tutti', traghetto:'f-active-traghetto', t1:'f-active-t1', t2:'f-active-t2', t3:'f-active-t3' };
  Object.entries(ids).forEach(([key, btnId]) => {
    const btn = document.getElementById(btnId);
    const hasRole = (key === 'tutti') ? true : turno.ruoli[key] !== null;
    btn.className = 'filtro-btn' + (currentFiltro === key ? ' '+activeClass[key] : '');
    btn.disabled = !hasRole;
  });
}

function getTreniPerFiltro(turnoKey, filtro) {
  const turno = TURNI[turnoKey];
  if (filtro === 'tutti') return turno.treni;
  const ruolo = turno.ruoli[filtro];
  if (!ruolo) return [];
  const allIds = [...ruolo.treni, ...ruolo.acc];
  return turno.treni.filter(t => allIds.includes(t.id));
}

function getRuoloDiTreno(turnoKey, trenoId) {
  const ruoli = TURNI[turnoKey].ruoli;
  for (const [key, r] of Object.entries(ruoli)) {
    if (!r) continue;
    if (r.treni.includes(trenoId) || r.acc.includes(trenoId)) return key;
  }
  return null;
}

// ── CONSULTA ──────────────────────────────────────────────────────────────────
function selectTurno(key) {
  currentTurnoKey = key;
  ['mattina','pomeriggio','notte'].forEach(k => {
    document.getElementById('btn'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('active', k===key);
  });
  const labels = { mattina:'Turno Mattina 🌅', pomeriggio:'Turno Pomeriggio ☀️', notte:'Turno Notte 🌙' };
  document.getElementById('consultaTurnoLabel').textContent = labels[key];
  renderTrenoList('consultaList', key, false);
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderTrenoList(containerId, turnoKey, highlightCurrent) {
  const container = document.getElementById(containerId);
  const giorno = getGiorno();
  const now = new Date();
  const nowMin = now.getHours()*60+now.getMinutes();
  const filtro = containerId === 'trenoList' ? currentFiltro : 'tutti';
  const treni = getTreniPerFiltro(turnoKey, filtro);

  container.innerHTML = '';
  if (!treni.length) {
    container.innerHTML = '<div class="empty-msg">Nessun treno per questo ruolo.</div>';
    return;
  }

  treni.forEach(treno => {
    const isExcluded = treno.excludeOn && treno.excludeOn.includes(giorno);
    const isAcc = !!treno.isAcc;
    const ruolo = getRuoloDiTreno(turnoKey, treno.id);

    let isNow = false;
    if (highlightCurrent && treno.partenzaPP) {
      const [h,m] = treno.partenzaPP.split(':').map(Number);
      isNow = Math.abs(nowMin-(h*60+m)) < 60;
    }

    const tipoClass = treno.tipo==='VALLONE'?'tipo-vallone':treno.tipo==='HTR'?'tipo-htr':'tipo-tradizionale';

    let roleBadge = '';
    if (ruolo) {
      const rl = ruolo==='traghetto'?'Trenitalia':ruolo.toUpperCase();
      roleBadge = `<span class="trole-badge trole-${ruolo}">${rl}</span>`;
    }

    let orarioStr = '';
    if (treno.partenzaPP) orarioStr = `PP ${treno.partenzaPP}`;
    if (treno.arrTermini) orarioStr += (orarioStr?' → ':'')+`T. ${treno.arrTermini}`;
    if (treno.notaDa) orarioStr = treno.notaDa;
    if (treno.presentazione) orarioStr += (orarioStr?' · ':'')+`Pres. ${treno.presentazione}`;

    const card = document.createElement('div');
    card.className = 'treno-card'+(isNow?' highlight':'')+(isExcluded?' dimmed':'');
    card.innerHTML = `
      ${roleBadge}
      ${isNow?'<span class="treno-now-badge">▶ IN CORSO</span>':''}
      <div style="padding-right:${ruolo?'86px':'0'}">
        <span class="treno-num">${treno.id}</span>
        <span class="treno-tipo ${tipoClass}">${treno.tipo}</span>
        ${isAcc?'<span class="acc-badge-sm">🔧 ACC</span>':''}
      </div>
      ${orarioStr?`<div class="treno-orari">${orarioStr}</div>`:''}
      ${isExcluded?`<div class="excluded-label">⚠️ Escluso oggi (${giorno})</div>`:''}
      ${treno.note?'<span class="note-pill">Note</span>':''}
    `;
    card.onclick = () => openDetail(treno, turnoKey);
    container.appendChild(card);
  });
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(treno, turnoKey) {
  currentBackScreen = currentMode==='traghettamento'?'screenTreno':'screenConsulta';
  document.getElementById('detailBack').onclick = () => showScreen(currentBackScreen);

  const giorno = getGiorno();
  const isDomenica = giorno==='domenica';
  const isSabato = giorno==='sabato';

  const tipoClass = treno.tipo==='VALLONE'?'tipo-vallone':treno.tipo==='HTR'?'tipo-htr':'tipo-tradizionale';
  const ruolo = getRuoloDiTreno(turnoKey, treno.id);
  const turnoRuoli = TURNI[turnoKey].ruoli;

  // Sequenza ruolo
  let seqHTML = '';
  if (ruolo && turnoRuoli[ruolo]) {
    const rd = turnoRuoli[ruolo];
    const seqItems = [...rd.treni.map(id=>({id,acc:false})), ...rd.acc.map(id=>({id,acc:true}))];
    const roleLabel = ruolo==='traghetto'?'Trenitalia':ruolo.toUpperCase()+' MIST';
    const flow = seqItems.map((s,i) => {
      const isCur = String(s.id)===String(treno.id);
      const cls = s.acc?'seq-item seq-acc':isCur?'seq-item seq-current':'seq-item seq-normal';
      return (i>0?'<span class="seq-arrow">→</span>':'')+`<span class="${cls}">${s.acc?'🔧':''}${s.id}</span>`;
    }).join('');
    seqHTML = `<div class="seq-box">
      <div class="seq-title">Sequenza ${roleLabel}</div>
      <div class="seq-flow">${flow}</div>
      <div class="seq-hint">🔧 = accessoriare/provare · non portato da questo turno</div>
    </div>`;
  }

  // Info orari
  let infoHTML = '';
  const hasInfo = treno.partenzaPP || treno.arrTermini || (treno.presentazione && !treno.isAcc);
  if (hasInfo) {
    infoHTML = `<div class="info-grid">
      ${treno.partenzaPP?`<div class="info-box"><div class="info-box-label">Partenza PP</div><div class="info-box-value v-accent">${treno.partenzaPP}</div><div class="info-box-sub">Parco Prenestino</div></div>`:''}
      ${treno.arrTermini?`<div class="info-box"><div class="info-box-label">Arrivo Termini</div><div class="info-box-value v-blue">${treno.arrTermini}</div><div class="info-box-sub">Roma Termini</div></div>`:''}
      ${treno.presentazione&&!treno.isAcc?`<div class="info-box ${!treno.partenzaPP&&!treno.arrTermini?'full':''}"><div class="info-box-label">Presentazione</div><div class="info-box-value v-yellow">${treno.presentazione}</div></div>`:''}
    </div>`;
  }

  // Prova freno
  let provaHTML = '';
  if (!treno.isAcc && (treno.tipo==='VALLONE'||treno.tipo==='TRADIZIONALE'||treno.tipo==='HTR')) {
    const daC = treno.tipo==='VALLONE';
    provaHTML = `<div class="prova-box">
      <div class="prova-icon">${daC?'🔚':'🔛'}</div>
      <div>
        <div class="prova-title">Prova Freno</div>
        <div class="prova-value">${daC?'DA CODA':'DA TESTA'}</div>
        <div class="prova-sub">${daC?'Materiale Vallone → posizionarsi in coda':'Materiale Tradizionale/HTR → posizionarsi in testa'}</div>
      </div>
    </div>`;
  }

  // ACC box
  let accHTML = '';
  if (treno.isAcc) {
    accHTML = `<div class="acc-box">
      <div class="acc-box-title">🔧 Accessoriamento / Prova</div>
      <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--green)">Treno ${treno.id}</div>
      <div class="acc-sub">Questo treno va accessoriato e provato ma <strong>non portato</strong> da questo turno.</div>
      ${treno.presentazione?`<div class="acc-sub">Presentazione: <strong>${treno.presentazione}</strong></div>`:''}
    </div>`;
  }

  // Rientro
  let rientroHTML = '';
  if (treno.rientro) {
    const opz = Array.isArray(treno.rientro)?treno.rientro:[treno.rientro];
    let items = '';
    opz.forEach(r => {
      if (r.tipo==='domenica' && !isDomenica) return;
      if (r.tipo==='sabato'   && !isSabato)   return;
      if (r.tipo==='avviso') {
        const mostra = !r.mostraGiorni||r.mostraGiorni.includes(giorno);
        if (mostra) items += `<div class="rientro-option"><div class="rdot rdot-yellow"></div><div class="rientro-text">⚠️ ${r.desc}</div></div>`;
        return;
      }
      if (r.tipo==='treno' && isDomenica && opz.find(o=>o.tipo==='domenica')) return;
      if (r.tipo==='treno' && r.excludeGiorni && r.excludeGiorni.includes(giorno)) return;

      let dotCls='rdot rdot-orange', content='';
      if (r.tipo==='treno') {
        dotCls='rdot rdot-green';
        content=`Portare giù <span class="rtime">${r.trenoNum}</span> (${r.tipoTreno})`;
        if (r.orario) content+=` — T. <span class="rtime">${r.orario}</span>`;
        if (r.note) content+=`<br><small style="color:var(--muted)">${r.note}</small>`;
      } else if (r.tipo==='taxi') {
        const soloG = r.soloGiorni;
        const ok = !soloG||soloG.includes(giorno);
        if (!ok) content=`<span style="color:var(--muted);text-decoration:line-through">🚕 ${r.desc} (oggi non applicabile)</span>`;
        else content=`🚕 ${r.desc}`;
      } else if (r.tipo==='navetta') {
        dotCls='rdot rdot-blue';
        content=`🚌 ${r.desc}`;
        if (r.orario) content+=` <span class="rtime">${r.orario}</span>`;
        if (r.note) content+=` <small style="color:var(--muted)">(${r.note})</small>`;
      } else if (r.tipo==='domenica') {
        dotCls='rdot rdot-blue';
        content=`🚌 ${r.desc}`;
      } else if (r.tipo==='sabato') {
        content=r.desc;
      }
      items+=`<div class="rientro-option"><div class="${dotCls}"></div><div class="rientro-text">${content}</div></div>`;
    });
    if (items) rientroHTML=`<div class="rientro-box"><div class="rientro-title">🏠 Rientro a Parco Prenestino</div>${items}</div>`;
  }

  // Note
  const noteHTML = treno.note?`<div class="note-box"><div class="note-box-title">⚠️ Note</div>${treno.note}</div>`:'';

  const trenoIdNum = String(treno.id).replace(/[^0-9]/g, '');
  const statoHTML = trenoIdNum ? `<div class="stato-box loading" id="statoBox_${trenoIdNum}"><div class="stato-title">📡 STATO IN TEMPO REALE</div><div class="stato-info">Caricamento...</div></div>` : '';

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-hero">
      <div class="detail-num">${treno.id}</div>
      <div class="detail-tipo">
        <span class="treno-tipo ${tipoClass}">${treno.tipo}</span>
        <span style="font-size:12px;color:var(--muted)">${treno.desc}</span>
      </div>
    </div>
    ${seqHTML}
    ${infoHTML}
    ${provaHTML}
    ${accHTML}
    ${rientroHTML}
    ${noteHTML}
    ${statoHTML}
  `;
  showScreen('screenDetail');
  if (trenoIdNum) setTimeout(() => caricaStato(trenoIdNum), 100);
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') cercaTreno();
});

function cercaTreno() {
  const q = parseInt(document.getElementById('searchInput').value.trim());
  const container = document.getElementById('searchResults');
  container.innerHTML = '';
  if (!q) return;

  const results = [];
  Object.entries(TURNI).forEach(([turnoKey, turno]) => {
    turno.treni.forEach(treno => {
      if (String(treno.id) === String(q) || treno.id === q) {
        results.push({ treno, turnoKey });
      }
    });
  });

  if (!results.length) {
    container.innerHTML = '<div class="search-not-found">Nessun treno trovato con numero ' + q + '</div>';
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'search-results-wrap';

  results.forEach(({ treno, turnoKey }) => {
    const t = TURNI[turnoKey];
    const ruolo = getRuoloDiTreno(turnoKey, treno.id);
    const tipoClass = treno.tipo==='VALLONE'?'tipo-vallone':treno.tipo==='HTR'?'tipo-htr':'tipo-tradizionale';
    let orarioStr = '';
    if (treno.partenzaPP) orarioStr = 'PP ' + treno.partenzaPP;
    if (treno.arrTermini) orarioStr += (orarioStr?' → ':'') + 'T. ' + treno.arrTermini;
    if (treno.notaDa) orarioStr = treno.notaDa;
    let roleBadge = '';
    if (ruolo) {
      const rl = ruolo==='traghetto'?'Trenitalia':ruolo.toUpperCase();
      roleBadge = '<span class="trole-badge trole-'+ruolo+'">'+rl+'</span>';
    }
    const card = document.createElement('div');
    card.className = 'search-result-card';
    card.innerHTML = '<div class="search-result-turno">'+t.emoji+' '+t.nome+'</div>' +
      roleBadge +
      '<div style="padding-right:'+(ruolo?'86px':'0')+'">' +
        '<span class="treno-num">'+treno.id+'</span>' +
        '<span class="treno-tipo '+tipoClass+'">'+treno.tipo+'</span>' +
        (treno.isAcc?'<span class="acc-badge-sm">🔧 ACC</span>':'') +
      '</div>' +
      (orarioStr?'<div class="treno-orari">'+orarioStr+'</div>':'') +
      (treno.note?'<span class="note-pill">Note</span>':'');
    card.onclick = () => {
      currentMode = 'consulta';
      openDetail(treno, turnoKey);
    };
    wrap.appendChild(card);
  });

  container.appendChild(wrap);
}


// ── STATO TEMPO REALE ─────────────────────────────────────────────────────────
const PROXY = 'https://traghettamenti-proxy.vercel.app/api/proxy';

async function caricaStato(numero) {
  const box = document.getElementById('statoBox_' + numero);
  if (!box) return;
  box.innerHTML = `
    <div class="info-grid">
      <div class="info-box"><div class="info-box-label">⏱ Ritardo</div><div class="info-box-value v-blue">...</div></div>
      <div class="info-box"><div class="info-box-label">🔢 Binario</div><div class="info-box-value v-yellow">...</div></div>
    </div>`;

  try {
    const res = await fetch(`${PROXY}?numero=${numero}`);
    const data = await res.json();

    if (data.error) {
      box.innerHTML = `<div class="info-grid"><div class="info-box full"><div class="info-box-label">📡 Stato</div><div class="info-box-value" style="font-size:13px;color:var(--muted)">⚠️ ${data.error}</div></div></div>`;
      return;
    }

    if (data.cancellato) {
      box.innerHTML = `<div class="info-grid"><div class="info-box full"><div class="info-box-label">📡 Stato</div><div class="info-box-value" style="color:var(--red)">CANCELLATO</div></div></div>`;
      return;
    }

    const ritardo = data.ritardo ?? 0;
    const ritardoStr = ritardo === 0 ? 'In orario' : ritardo > 0 ? `+${ritardo} min` : `${ritardo} min`;
    const ritardoColor = ritardo <= 0 ? 'v-green' : 'v-red';

    let stazStr = '';
    if (data.stazioneUltima && data.stazioneUltima !== '--') {
      stazStr = data.stazioneUltima;
      if (data.oraUltima) {
        const d = new Date(data.oraUltima);
        const hh = String(d.getHours()).padStart(2,'0');
        const mm = String(d.getMinutes()).padStart(2,'0');
        stazStr += ` · ${hh}:${mm}`;
      }
    }

    const binarioStr = data.binario ? `${data.binario}` : '—';

    box.innerHTML = `
      <div class="info-grid">
        <div class="info-box">
          <div class="info-box-label">⏱ Ritardo</div>
          <div class="info-box-value ${ritardoColor}" style="font-size:16px">${ritardoStr}</div>
          ${stazStr ? `<div class="info-box-sub">📍 ${stazStr}</div>` : ''}
        </div>
        <div class="info-box">
          <div class="info-box-label">🔢 Binario</div>
          <div class="info-box-value v-yellow">${binarioStr}</div>
          <div class="info-box-sub">${data.binario ? 'Programmato' : 'Non disponibile'}</div>
        </div>
      </div>`;

  } catch(e) {
    box.innerHTML = `<div class="info-grid"><div class="info-box full"><div class="info-box-label">📡 Stato</div><div class="info-box-value" style="font-size:13px;color:var(--muted)">⚠️ Errore di connessione</div></div></div>`;
  }
}

</script>
